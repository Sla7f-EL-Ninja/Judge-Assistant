services:
  # ---------------------------------------------------------------------------
  # MongoDB - Primary data store (cases, conversations, summaries, documents)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USERNAME:-admin}", "-p", "${MONGO_ROOT_PASSWORD:-changeme}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Qdrant - Vector store for RAG embeddings (replaces ChromaDB)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis - Caching, rate limiting, session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage for uploaded files
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL - User management, RBAC, audit logging
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-judge_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # API - FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tei-embedder:
        condition: service_healthy
      tei-reranker:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # MongoDB
      - JA_MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/?authSource=admin
      # Qdrant
      - JA_QDRANT_HOST=qdrant
      - JA_QDRANT_PORT=6333
      - JA_QDRANT_GRPC_PORT=6334
      # Redis
      - JA_REDIS_URL=redis://redis:6379/0
      # MinIO
      - JA_MINIO_ENDPOINT=minio:9000
      - JA_MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - JA_MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      # PostgreSQL
      - JA_POSTGRESQL_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-judge_assistant}
      - JA_POSTGRESQL_SYNC_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-judge_assistant}
      # TEI services
      - JA_TEI_EMBEDDING_URL=http://tei-embedder:80
      - JA_TEI_RERANKER_URL=http://tei-reranker:80
    volumes:
      - ./uploads:/app/uploads
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ---------------------------------------------------------------------------
  # TEI Embedding Service - BAAI/bge-m3 (dense vectors for civil law RAG)
  # ---------------------------------------------------------------------------
  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    ports:
      - "8080:80"
    command: ["--model-id", "BAAI/bge-m3", "--port", "80"]
    volumes:
      - tei_model_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # TEI Reranker Service - BAAI/bge-reranker-v2-m3 (cross-encoder)
  # ---------------------------------------------------------------------------
  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    ports:
      - "8081:80"
    command: ["--model-id", "BAAI/bge-reranker-v2-m3", "--port", "80"]
    volumes:
      - tei_model_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Streamlit - Testing UI (optional, use --profile testing)
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://api:8000
      - JWT_SECRET=${JA_API_JWT_SECRET:-change-me-in-production}
    profiles:
      - testing

volumes:
  mongo_data:
  qdrant_data:
  redis_data:
  minio_data:
  postgres_data:
  huggingface_cache:
  tei_model_cache:

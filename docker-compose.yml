services:
  # ---------------------------------------------------------------------------
  # MongoDB - Primary data store (cases, conversations, summaries, documents)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD required}
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USERNAME}", "-p", "${MONGO_ROOT_PASSWORD}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Qdrant - Vector store for RAG embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis - Caching, rate limiting, session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage for uploaded files
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PostgreSQL - User management, RBAC, audit logging
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-judge_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # API - FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      # MongoDB
      - JA_MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      # Qdrant
      - JA_QDRANT_HOST=qdrant
      - JA_QDRANT_PORT=6333
      - JA_QDRANT_GRPC_PORT=6334
      # Redis
      - JA_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # MinIO
      - JA_MINIO_ENDPOINT=minio:9000
      - JA_MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - JA_MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      # PostgreSQL
      - JA_POSTGRESQL_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judge_assistant}
      - JA_POSTGRESQL_SYNC_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judge_assistant}
    volumes:
      - ./uploads:/app/uploads
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Streamlit - Testing UI (optional, use --profile testing)
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://api:8000
      - JWT_SECRET=${JA_API_JWT_SECRET:?JA_API_JWT_SECRET required}
    profiles:
      - testing

volumes:
  mongo_data:
  qdrant_data:
  redis_data:
  minio_data:
  postgres_data:
  huggingface_cache:

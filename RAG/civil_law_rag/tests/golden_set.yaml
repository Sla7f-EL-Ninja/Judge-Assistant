# golden_set.yaml
# ----------------
# Curated Q&A pairs for evaluating the Civil Law RAG pipeline.
#
# Fields:
#   id:             Unique identifier
#   type:           analytical | textual | off_topic
#   query:          User query in Arabic
#   expected_articles: article numbers that MUST appear in retrieved results
#   answer_keywords:   Arabic keywords that MUST appear in the generated answer
#   should_fail:    true if the expected result is cannot_answer / off_topic
#
# Eval thresholds (enforced by eval_harness.py):
#   - Retrieval precision@5:    ≥ 0.80 (expected articles in top-5)
#   - Citation faithfulness:    ≥ 0.95 (cited articles in retrieved set)
#   - Off-topic accuracy:       = 1.00 (never answer an off-topic query)


[pytest]
asyncio_mode = auto
testpaths = .
markers =
    expensive: Tests that invoke real LLM / real external services (Gemini, Qdrant, Mongo)
    unit: Pure logic tests, no external dependencies
    integration: Tests requiring DB or network

# Run cheap tests by default; gate expensive with: RUN_EXPENSIVE=1 pytest -m expensive
# Or run all: pytest tests/supervisor -v --tb=short
addopts = -v -s
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

[pytest]
asyncio_mode = auto
testpaths = .
markers =
    unit: Pure logic tests with no external dependencies
    integration: Tests requiring database or network access
    regression: Tests for previously fixed bugs
    behavioral: Tests involving LLM calls or end-to-end behavior
    performance: Latency, throughput, and memory tests
    llm_eval: Expensive LLM evaluation tests (nightly only)
    summarizer_unit: Summarizer unit tests (no LLM, fast)
    summarizer_llm: Summarizer tests requiring a real LLM call (slow)
    case_reasoner_llm: Case Reasoner tests requiring a real LLM call (slow)

# Show full test names, captured stdout, and live log output for every test
addopts = -v -s
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

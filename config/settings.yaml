# config/settings.yaml
#
# Centralized configuration for Judge Assistant.
# Local overrides go in settings.local.yaml (gitignored).
# Environment variables with JA_ prefix override any YAML value.
# See CONFIG.md for full documentation.

# -------------------------------------------------------
# LLM Tier Configuration
# -------------------------------------------------------
# Three tiers based on task complexity:
#   high   - Complex reasoning, synthesis, legal analysis
#   medium - Classification, grading, structured extraction
#   low    - Simple routing, validation, fallback tasks
# -------------------------------------------------------
llm:
  high:
    provider: groq            # groq | google
    model: llama-3.3-70b-versatile
    temperature: 0.0
  medium:
    provider: groq
    model: llama-3.3-70b-versatile
    temperature: 0.0
  low:
    provider: groq
    model: llama-3.3-70b-versatile
    temperature: 0.0

# -------------------------------------------------------
# Embedding Model
# -------------------------------------------------------
embedding:
  model: BAAI/bge-m3

# -------------------------------------------------------
# MongoDB
# -------------------------------------------------------
mongodb:
  uri: mongodb://localhost:27017/
  database: Rag
  collection: Document Storage

# -------------------------------------------------------
# Vector Store - Chroma
# -------------------------------------------------------
chroma:
  collection: judicial_docs
  persist_dir: ./chroma_data

# -------------------------------------------------------
# API Server
# -------------------------------------------------------
api:
  app_name: Judge Assistant API
  app_version: 0.1.0
  debug: false
  cors_origins: "*"
  jwt_secret: change-me-in-production
  jwt_algorithm: HS256
  max_upload_bytes: 20971520
  allowed_mime_types: application/pdf,image/png,image/jpeg,image/tiff,image/bmp,image/webp
  upload_dir: ./uploads
  langgraph_module: Supervisor.graph

# -------------------------------------------------------
# Supervisor
# -------------------------------------------------------
supervisor:
  max_retries: 2
  max_conversation_turns: 20
  agent_names:
    - ocr
    - summarize
    - civil_law_rag
    - case_doc_rag
    - reason

# -------------------------------------------------------
# OCR Pipeline
# -------------------------------------------------------
ocr:
  language: ar
  use_gpu: true
  preprocessing:
    enable_resolution_check: true
    min_dpi: 150
    enable_deskew: true
    enable_denoise: false
    enable_border_removal: true
    enable_contrast_enhancement: true
  confidence:
    high_threshold: 0.85
    medium_threshold: 0.60
  postprocessing:
    enable_dictionary_correction: true
    max_levenshtein_distance: 2
    normalize_digits: arabic_indic
  security:
    max_file_size_mb: 50
    allowed_extensions:
      - .png
      - .jpg
      - .jpeg
      - .tiff
      - .bmp
      - .pdf
  performance:
    surya_batch_size: 4
    batch_workers: 4

[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
pythonpath = .
norecursedirs = old .pytest_cache __pycache__
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
markers =
    slow: marks tests as slow (document ingestion, LangGraph queries)
